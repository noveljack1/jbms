name: Historical Signal Generation

on:
  workflow_dispatch:
    inputs:
      max_minutes_total:
        description: "Total python budget (minutes). Job timeout is 350."
        required: false
        default: "340"
      upload_buffer_min:
        description: "Minutes reserved for DB uploads"
        required: false
        default: "25"
      max_symbols:
        description: "Max symbols per run"
        required: false
        default: "2000"
      end_date:
        description: "End date YYYY-MM-DD (optional)"
        required: false
        default: ""

jobs:
  hist-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout PUBLIC runner repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout PRIVATE code repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private_repo
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          ${{ secrets.RCLONE_CONFIG }}
          RCLONE_EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip >/dev/null
          pip install -r private_repo/requirements.txt -q

      - name: Resolve YEAR (IST)
        run: |
          YEAR=$(TZ='Asia/Kolkata' date +'%Y')
          echo "YEAR=$YEAR" >> $GITHUB_ENV

      - name: Create data dir
        run: mkdir -p private_repo/data

      - name: Download DBs (needed for cross-year lookback)
        run: |
          for y in $(seq 1995 ${{ env.YEAR }}); do
            rclone copy "gdrive:market_db/market_${y}.db" private_repo/data/ \
              --drive-acknowledge-abuse --quiet 2>/dev/null || true
          done

      - name: Marker (upload only modified DBs)
        run: touch .marker_hist_signals

      - name: Run historical_signal_generator.py (logs captured)
        working-directory: private_repo
        run: |
          set -euo pipefail
          python scripts/historical_signal_generator.py \
            --max-minutes "${{ inputs.max_minutes_total }}" \
            --upload-buffer-min "${{ inputs.upload_buffer_min }}" \
            --max-symbols "${{ inputs.max_symbols }}" \
            --end-date "${{ inputs.end_date }}" \
            > ../hist_signals.log 2>&1

      - name: Show last lines only if failed
        if: failure()
        run: tail -n 200 hist_signals.log || true

      - name: Upload modified DBs
        run: |
          set -euo pipefail
          for db in $(find private_repo/data -maxdepth 1 -name "market_*.db" -newer .marker_hist_signals); do
            rclone copy "$db" gdrive:market_db/ --drive-acknowledge-abuse --quiet || true
          done

      - name: Cleanup
        if: always()
        run: rm -rf private_repo hist_signals.log

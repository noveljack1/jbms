name: Shareholding Backfill (2001 → Current Year)

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year (>= 2001 recommended)"
        required: false
        default: "2001"
      end_year:
        description: "AUTO = current IST year"
        required: false
        default: "AUTO"
      max_minutes:
        description: "Max minutes for python"
        required: false
        default: "320"
      upload_buffer_min:
        description: "Minutes reserved for uploads"
        required: false
        default: "25"

jobs:
  shp-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout PUBLIC runner repo
        uses: actions/checkout@v4

      - name: Checkout PRIVATE code repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private_repo
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          ${{ secrets.RCLONE_CONFIG }}
          RCLONE_EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip >/dev/null
          pip install -r private_repo/requirements.txt -q

      - name: Resolve end_year
        run: |
          END="${{ inputs.end_year }}"
          if [ -z "$END" ] || [ "$END" = "AUTO" ]; then
            END=$(TZ='Asia/Kolkata' date +'%Y')
          fi
          echo "END_YEAR=$END" >> $GITHUB_ENV

      - name: Create data dir
        run: mkdir -p private_repo/data

      - name: Download existing DBs (2001..END_YEAR)
        run: |
          for y in $(seq 2001 ${{ env.END_YEAR }}); do
            rclone copy "gdrive:market_db/market_${y}.db" private_repo/data/ \
              --drive-acknowledge-abuse --quiet 2>/dev/null || true
          done

      - name: Marker (upload only modified DBs)
        run: touch .marker_shp

      - name: Run shareholding backfill (quiet-ish)
        working-directory: private_repo
        run: |
          set -euo pipefail
          python scripts/shareholding_backfill.py \
            --start-year "${{ inputs.start_year }}" \
            --end-year "${{ env.END_YEAR }}" \
            --max-minutes "${{ inputs.max_minutes }}" \
            --upload-buffer-min "${{ inputs.upload_buffer_min }}" \
            > ../shp_backfill.log 2>&1 || (tail -n 200 ../shp_backfill.log && exit 1)
          tail -n 80 ../shp_backfill.log

      - name: Upload modified DBs
        run: |
          set -euo pipefail
          for db in $(find private_repo/data -maxdepth 1 -name "market_*.db" -newer .marker_shp); do
            rclone copy "$db" gdrive:market_db/ --drive-acknowledge-abuse --quiet || true
          done

      - name: Cleanup
        if: always()
        run: rm -rf private_repo shp_backfill.log
